# =============================================================
# 心理健康咨询平台 - Docker Compose 编排配置
# 三容器架构：MySQL + Spring Boot + Nginx
# 使用方式：docker compose up -d --build
# =============================================================

services:

  # ─────────────────────────────────────────
  # 数据库服务 - MySQL 8.0
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mh-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}       # 数据库 root 密码
      MYSQL_DATABASE: mental_health                      # 自动创建数据库
      MYSQL_CHARACTER_SET_SERVER: utf8mb4                 # 字符集
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci         # 排序规则
      TZ: Asia/Shanghai                                  # 时区
    volumes:
      # 数据持久化 - 容器删除后数据不丢失
      - mysql-data:/var/lib/mysql
      # 自动初始化 - 首次启动时执行 database/ 下的 SQL 文件
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-3306}:3306"                          # 可选：暴露端口供外部工具连接
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mh-network

  # ─────────────────────────────────────────
  # 后端服务 - Spring Boot
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mh-backend
    restart: unless-stopped
    environment:
      # 数据库连接（使用容器名 mysql 作为主机名）
      DB_URL: jdbc:mysql://mysql:3306/mental_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy                       # 等待 MySQL 健康检查通过后再启动
    networks:
      - mh-network

  # ─────────────────────────────────────────
  # 前端服务 - Nginx（静态资源 + 反向代理）
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mh-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"                             # 对外暴露端口（默认80）
    depends_on:
      - backend                                          # 确保后端先启动
    networks:
      - mh-network

# ─────────────────────────────────────────
# 网络与存储卷
# ─────────────────────────────────────────
networks:
  mh-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
